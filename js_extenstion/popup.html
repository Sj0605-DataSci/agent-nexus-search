<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiscoverMinds.ai - LinkedIn Sync</title>
    <link rel="stylesheet" href="popup.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <main>
        <div id="loginSection" class="card">
          <div class="card-content">
            <h2>Connect Your LinkedIn</h2>
            <p class="description">
              Sync your LinkedIn network to unlock powerful search and discovery
              features on DiscoverMinds.ai
            </p>
            <button id="signinBtn" class="primary-button">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="currentColor"
                style="margin-right: 8px"
              >
                <path
                  d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3v9zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66V19z"
                />
              </svg>
              Sign in with LinkedIn
            </button>
            <p class="note">We only request read access to your connections</p>
          </div>
        </div>

        <!-- Profile Section (shown when user is signed in) -->
        <div id="profileSection" class="card" style="display: none;">
          <div class="profile-header">
            <img id="profileImage" src="" alt="Profile" />
            <h2 id="profileName"></h2>
            <div id="statusBadge" class="status-badge active">Active</div>
          </div>

          <div class="sync-info">
            <div id="syncStatusText"></div>
            <div id="lastSyncTime" class="text-xs"></div>
            <div id="nextSyncTime" class="text-xs"></div>
            <button id="syncButton" class="text-button">Sync now</button>
          </div>

          <div
            id="connectionCount"
            class="text-center text-sm text-muted-foreground"
          ></div>

          <button id="disconnectButton" class="text-button">
            Disconnect account
          </button>
        </div>

        <!-- Connecting Section (shown during sign in process) -->
        <div id="connectingSection" class="spinner-container" style="display: none;">
          <div class="loader"></div>
          <p>Connecting to LinkedIn...</p>
        </div>
      </main>

      <div id="resultsContainer">
        <div id="connectionsSection" class="mt-4">
          <div
            id="connectionCount"
            class="text-center text-sm text-muted-foreground"
          ></div>
        </div>
      </div>

      <footer class="app-footer">
        <p>Powered by <strong>DiscoverMinds.ai</strong></p>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
