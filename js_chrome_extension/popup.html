<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        padding: 0;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #2a2a2a;
        color: white;
        border-radius: 8px;
        overflow: hidden;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px;
        background: #333333;
        border-bottom: 1px solid #404040;
      }

      .icon {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 500;
        color: #ffffff;
      }

      .content {
        padding: 20px;
      }

      .social-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0;
        border-bottom: 1px solid #404040;
      }

      .social-item:last-child {
        border-bottom: none;
      }

      .social-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        font-size: 18px;
      }

      .linkedin-icon {
        background: #0077b5;
        color: white;
      }

      .twitter-icon {
        background: #1da1f2;
        color: white;
      }

      .social-info {
        flex: 1;
      }

      .social-name {
        font-size: 16px;
        font-weight: 500;
        color: #ffffff;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .beta-tag {
        background: #666666;
        color: #cccccc;
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 400;
      }

      .social-status {
        font-size: 14px;
        color: #999999;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff6b6b;
      }

      .login-section {
        padding: 20px;
        border-top: 1px solid #404040;
      }

      .login-button {
        width: 100%;
        padding: 12px 16px;
        background: transparent;
        border: 1px solid #666666;
        border-radius: 6px;
        color: #ffffff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s ease;
      }

      .login-button:hover {
        background: #404040;
        border-color: #777777;
      }

      .arrow-icon {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="icon">🍀</div>
      <h1>Discover Minds</h1>
    </div>

    <div class="content">
      <div class="social-item">
        <div class="social-icon linkedin-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
            />
          </svg>
        </div>
        <div class="social-info">
          <div class="social-name">LinkedIn</div>
          <div class="social-status">
            <div class="status-dot"></div>
            Not connected
          </div>
        </div>
    </div>

    <div class="login-section">
      <button class="login-button" id="loginButton">
        Log in to Discover Minds
        <span class="arrow-icon">↗</span>
      </button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
