<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 500px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out;
        }

        .checkmark {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: drawCheck 0.5s ease-out 0.3s forwards;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .info {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 20px;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
        }

        .error-icon {
            background: rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="success-icon" id="icon">
            <svg class="checkmark" viewBox="0 0 52 52">
                <path d="M14 27l7 7 16-16"/>
            </svg>
        </div>
        <h1 id="title">Authentication Successful!</h1>
        <p id="message">Redirecting you back to Tallie...</p>
        <div class="spinner"></div>
        <p class="info">You can close this window if it doesn't close automatically.</p>
    </div>

    <script>
        // Extract tokens from URL hash
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');
        const error = params.get('error');
        const errorDescription = params.get('error_description');

        if (error) {
            // Show error
            document.getElementById('container').classList.add('error');
            document.getElementById('icon').classList.add('error-icon');
            document.getElementById('icon').innerHTML = '✕';
            document.getElementById('title').textContent = 'Authentication Failed';
            document.getElementById('message').textContent = errorDescription || error;
            document.querySelector('.spinner').style.display = 'none';
        } else if (accessToken) {
            // Build the protocol URL with tokens
            const protocolUrl = `tallie://oauth/callback#access_token=${accessToken}&refresh_token=${refreshToken || ''}`;
            
            console.log('Redirecting to:', protocolUrl);
            
            // Try to redirect to protocol handler
            try {
                window.location.href = protocolUrl;
                
                // Close window after a delay
                setTimeout(() => {
                    window.close();
                }, 2000);
            } catch (err) {
                console.error('Failed to redirect:', err);
                document.getElementById('message').textContent = 'Please return to the Tallie app.';
            }
        } else {
            // No tokens found
            document.getElementById('container').classList.add('error');
            document.getElementById('icon').classList.add('error-icon');
            document.getElementById('icon').innerHTML = '✕';
            document.getElementById('title').textContent = 'Authentication Error';
            document.getElementById('message').textContent = 'No authentication tokens received.';
            document.querySelector('.spinner').style.display = 'none';
        }
    </script>
</body>
</html>
