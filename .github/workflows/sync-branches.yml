name: Sync All Branches from Upstream

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 3 AM UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote (with PAT)
        env:
          TOKEN: ${{ secrets.UPSTREAM_PAT }}
        run: |
          git remote add upstream https://$TOKEN@github.com/SJ0605-DataSci/agent-nexus-search.git

      - name: Fetch all branches from upstream
        run: git fetch upstream

      - name: Sync each upstream branch to origin
        run: |
          for branch in $(git ls-remote --heads upstream | awk '{print $2}' | sed 's/refs\/heads\///'); do
            echo "Syncing branch: $branch"
            git checkout $branch 2>/dev/null || git checkout -b $branch upstream/$branch
            git merge upstream/$branch --strategy-option theirs || echo "No merge needed for $branch"
            git push origin $branch
          done
