name: Sync All Branches from Upstream

on:
  schedule:
    - cron: "0 3 * * *" # Every day at 3 AM UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/SJ0605-DataSci/agent-nexus-search.git

      - name: Fetch all branches from upstream
        run: git fetch upstream

      - name: Sync all branches
        run: |
          for branch in $(git ls-remote --heads upstream | cut -f2 | sed 's/refs\/heads\///'); do
            echo "Syncing branch: $branch"
            git checkout $branch || git checkout -b $branch upstream/$branch
            git merge upstream/$branch || echo "Nothing to merge for $branch"
            git push origin $branch
          done
